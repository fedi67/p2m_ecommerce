services:
  # 1. La base de données avec l'extension pgvector intégrée (No changes needed)
  db:
    image: pgvector/pgvector:pg16-trixie
    container_name: ecommerce_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-RFdn1234?!}
      POSTGRES_DB: smart_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # 2. Le Backend Python
  backend:
    build: ./ecommerce/server
    container_name: ecommerce_backend
    ports:
      - "8000:8000"
    env_file:
      - ./ecommerce/server/.env
    environment:
      - DB_HOST=db 
    depends_on:
      - db
    # --- NOUVEAU POUR LE HOT RELOAD ---
    # Syncs your local code to the container. 
    # NOTE: Change '/app' if your backend Dockerfile uses a different WORKDIR
    volumes:
      - /app
    # Overrides the static start command to use uvicorn's auto-reloader
    # NOTE: Change 'main:app' if your python file is named something else (e.g., 'app:app')
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # 3. Le Frontend (Vite)
  frontend:
    build: ./ecommerce/frontend
    container_name: ecommerce_frontend
    ports:
      - "5174:5173"
    depends_on:
      - backend
    # --- NOUVEAU POUR LE HOT RELOAD ---
    volumes:
      # Syncs your local Vite code to the container
      - /app
      # This "anonymous volume" protects your container's installed packages
      # from being overwritten by your local machine
      - /app/node_modules
    # Starts Vite in development mode and exposes it to the network
    command: npm run dev -- --host 0.0.0.0

# Volume persistant 
volumes:
  pgdata: